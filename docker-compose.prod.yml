version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: otp-bot-prod
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - otp-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  mongo:
    image: mongo:7
    container_name: otp-mongo-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-backup:/backup
    networks:
      - otp-network
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS}
    command: ["--auth", "--bind_ip_all"]

  redis:
    image: redis:7-alpine
    container_name: otp-redis-prod
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - otp-network
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes

  nginx:
    image: nginx:alpine
    container_name: otp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    networks:
      - otp-network

volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

networks:
  otp-network:
    driver: bridge
